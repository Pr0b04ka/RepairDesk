<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список устройств</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Список устройств</h2>
    <div class="mb-3">
        <a class="btn btn-primary" th:href="@{/devices/create}">Создать устройство</a>
        <a class="btn btn-secondary" th:href="@{/orders}">Заказы</a>
        <a class="btn btn-secondary" th:href="@{/clients}">Клиенты</a>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger">
        <span th:text="${errorMessage}"></span>
    </div>

    <div th:if="${successMessage}" class="alert alert-success">
        <span th:text="${successMessage}"></span>
    </div>

    <script>
        setTimeout(function() {
            let alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => alert.style.display = 'none');
        }, 2000);
    </script>

    <table class="table table-striped table-bordered">
        <thead>
        <tr>
            <th>ID</th>
            <th>Бренд</th>
            <th>Модель</th>
            <th>Тип</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="device : ${devices}">
            <td th:text="${device.id}"></td>
            <td th:text="${device.brand}"></td>
            <td th:text="${device.model}"></td>
            <td th:text="${device.type}"></td>
            <td>
                <a class="btn btn-sm btn-warning"
                   th:href="@{/devices/edit/{id}(id=${device.id})}">
                    Редактировать
                </a>

                <a class="btn btn-sm btn-danger"
                   th:href="@{/devices/delete/{id}(id=${device.id})}"
                   onclick="return confirm('Удалить устройство?');">
                    Удалить
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
