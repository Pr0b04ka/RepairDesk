<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список устройств</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Список устройств</h2>
    <div class="mb-3">
        <a class="btn btn-primary" th:href="@{/devices/create}">Создать устройство</a>
        <a class="btn btn-secondary" th:href="@{/orders}">Заказы</a>
        <a class="btn btn-secondary" th:href="@{/clients}">Клиенты</a>
    </div>
    <table class="table table-striped table-bordered">
        <thead>
        <tr>
            <th>ID</th>
            <th>Бренд</th>
            <th>Модель</th>
            <th>Тип</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="device : ${devices}">
            <td th:text="${device.id}"></td>
            <td th:text="${device.brand}"></td>
            <td th:text="${device.model}"></td>
            <td th:text="${device.type}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
