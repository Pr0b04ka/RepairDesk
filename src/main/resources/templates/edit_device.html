<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактировать устройство — RepairDesk</title>
</head>
<body th:replace="~{layout :: layout('Редактировать устройство — RepairDesk', ~{::section})}">

<section>
<div class="topbar">
    <div class="page-title">▣ Редактировать устройство</div>
    <a class="btn btn-secondary btn-sm" th:href="@{/devices}">← Назад</a>
</div>

<div class="page-content">
    <form class="rd-form" th:action="@{/devices/edit/{id}(id=${device.id})}" th:object="${device}" method="post">
        <!-- ИСПРАВЛЕНО: было /device/edit → должно быть /devices/edit -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
            <label for="brand">Бренд</label>
            <input type="text" id="brand" th:field="*{brand}" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="model">Модель</label>
            <input type="text" id="model" th:field="*{model}" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="type">Тип устройства</label>
            <input type="text" id="type" th:field="*{type}" class="form-control" required>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-success">→ Сохранить</button>
            <a class="btn btn-secondary" th:href="@{/devices}">Отмена</a>
        </div>
    </form>
</div>
</section>

</body>
</html>
