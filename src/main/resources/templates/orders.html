<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список заказов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Список заказов</h2>
    <div class="mb-3">
        <a class="btn btn-primary" th:href="@{/orders/create}">Создать заказ</a>
        <a class="btn btn-secondary" th:href="@{/clients}">Клиенты</a>
        <a class="btn btn-secondary" th:href="@{/devices}">Устройства</a>
    </div>
    <table class="table table-striped table-bordered">
        <thead>
        <tr>
            <th>ID</th>
            <th>Клиент</th>
            <th>Устройство</th>
            <th>Жалоба</th>
            <th>Диагностика</th>
            <th>Ремонт одобрен</th>
            <th>Время (ч)</th>
            <th>Итоговый результат</th>
            <th>Стоимость</th>
            <th>Статус</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}"></td>
            <td th:text="${order.clientFirstName} + ' ' + ${order.clientLastName}"></td>
            <td th:text="${order.deviceBrand} + ' ' + ${order.deviceModel}"></td>
            <td th:text="${order.complaint}"></td>
            <td th:text="${order.diagnosticsResult}"></td>
            <td th:text="${order.repairApproved} ? 'Да' : 'Нет'"></td>
            <td th:text="${order.timeSpent}"></td>
            <td th:text="${order.finalSummary}"></td>
            <td th:text="${order.finalPrice}"></td>
            <td th:text="${order.status}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
