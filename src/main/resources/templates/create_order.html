<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(#{orders.new} + ' — RepairDesk', ~{::section})}">
<head></head>
<body>
<section>
<div class="topbar">
    <div class="page-title">⚙ <span th:text="#{orders.new}">New Order</span></div>
    <a class="btn btn-secondary btn-sm" th:href="@{/orders}" th:text="'← ' + #{btn.back}">← Back</a>
</div>
<div class="page-content">
    <form class="rd-form" th:action="@{/orders/create}" th:object="${order}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
            <label for="clientId" th:text="#{orders.client}">Client</label>
            <select id="clientId" th:field="*{clientId}" class="form-select" required>
                <option value="">—</option>
                <option th:each="c : ${clients}" th:value="${c.id}"
                        th:text="${c.firstName} + ' ' + ${c.lastName} + ' (' + ${c.phone} + ')'"></option>
            </select>
        </div>

        <div class="form-group">
            <label for="deviceId" th:text="#{orders.device}">Device</label>
            <select id="deviceId" th:field="*{deviceId}" class="form-select" required>
                <option value="">—</option>
                <option th:each="d : ${devices}" th:value="${d.id}"
                        th:text="${d.brand} + ' ' + ${d.model} + ' (' + ${d.type} + ')'"></option>
            </select>
        </div>

        <div class="form-group">
            <label for="complaint" th:text="#{orders.complaint}">Complaint</label>
            <input type="text" id="complaint" th:field="*{complaint}" class="form-control" required>
        </div>

        <div style="height:1px; background:var(--border); margin:24px 0;"></div>
        <p style="font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:16px;">// <span th:text="#{orders.diagnostics}">Diagnostics</span></p>

        <div class="form-group">
            <label for="diagnosticsResult" th:text="#{orders.diagnostics}">Diagnostics</label>
            <input type="text" id="diagnosticsResult" th:field="*{diagnosticsResult}" class="form-control">
        </div>

        <div class="form-group">
            <div class="form-check">
                <input type="checkbox" id="repairApproved" th:field="*{repairApproved}">
                <label for="repairApproved" th:text="#{orders.repairApproved}">Client approved repair</label>
            </div>
        </div>

        <div class="form-group">
            <label for="partsCost" th:text="#{orders.partsCost}">Parts cost</label>
            <input type="number" id="partsCost" th:field="*{partsCost}" class="form-control" step="0.01" min="0" placeholder="0.00">
        </div>

        <div class="form-group">
            <label for="laborCost" th:text="#{orders.laborCost}">Labor cost</label>
            <input type="number" id="laborCost" th:field="*{laborCost}" class="form-control" step="0.01" min="0" placeholder="0.00">
        </div>

        <div class="form-group">
            <label for="timeSpentHours" th:text="#{orders.timeSpent}">Time spent</label>
            <input type="number" id="timeSpentHours" th:field="*{timeSpentHours}" class="form-control" step="0.5" min="0" placeholder="0.0">
        </div>

        <div class="form-group">
            <label for="finalSummary" th:text="#{orders.finalSummary}">Work summary</label>
            <input type="text" id="finalSummary" th:field="*{finalSummary}" class="form-control">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-success">→ <span th:text="#{btn.save}">Save</span></button>
            <a class="btn btn-secondary" th:href="@{/orders}" th:text="#{btn.cancel}">Cancel</a>
        </div>
    </form>
</div>
</section>
</body>
</html>
