<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Новый заказ — RepairDesk</title>
</head>
<body th:replace="~{layout :: layout('Новый заказ — RepairDesk', ~{::section})}">

<section>
<div class="topbar">
    <div class="page-title">⚙ Новый заказ</div>
    <a class="btn btn-secondary btn-sm" th:href="@{/orders}">← Назад</a>
</div>

<div class="page-content">
    <form class="rd-form" th:action="@{/orders/create}" th:object="${order}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
            <label for="clientId">Клиент</label>
            <select id="clientId" th:field="*{clientId}" class="form-select" required>
                <option value="">— Выберите клиента —</option>
                <option th:each="c : ${clients}"
                        th:value="${c.id}"
                        th:text="${c.firstName} + ' ' + ${c.lastName} + ' (' + ${c.phone} + ')'">
                </option>
            </select>
        </div>

        <div class="form-group">
            <label for="deviceId">Устройство</label>
            <select id="deviceId" th:field="*{deviceId}" class="form-select" required>
                <option value="">— Выберите устройство —</option>
                <option th:each="d : ${devices}"
                        th:value="${d.id}"
                        th:text="${d.brand} + ' ' + ${d.model} + ' (' + ${d.type} + ')'">
                </option>
            </select>
        </div>

        <div class="form-group">
            <label for="complaint">Жалоба клиента</label>
            <input type="text" id="complaint" th:field="*{complaint}" class="form-control"
                   placeholder="Опишите проблему..." required>
        </div>

        <div style="height:1px; background:var(--border); margin: 24px 0;"></div>
        <p style="font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:16px;">// Диагностика (заполняется позже)</p>

        <div class="form-group">
            <label for="diagnosticsResult">Результат диагностики</label>
            <input type="text" id="diagnosticsResult" th:field="*{diagnosticsResult}" class="form-control"
                   placeholder="Результат осмотра...">
        </div>

        <div class="form-group">
            <div class="form-check">
                <input type="checkbox" id="repairApproved" th:field="*{repairApproved}">
                <label for="repairApproved">Клиент одобрил ремонт</label>
            </div>
        </div>

        <div class="form-group">
            <label for="partsCost">Стоимость запчастей (₽)</label>
            <input type="number" id="partsCost" th:field="*{partsCost}" class="form-control"
                   step="0.01" min="0" placeholder="0.00">
        </div>

        <div class="form-group">
            <label for="laborCost">Стоимость работы (₽)</label>
            <input type="number" id="laborCost" th:field="*{laborCost}" class="form-control"
                   step="0.01" min="0" placeholder="0.00">
        </div>

        <div class="form-group">
            <label for="timeSpentHours">Затрачено времени (ч)</label>
            <input type="number" id="timeSpentHours" th:field="*{timeSpentHours}" class="form-control"
                   step="0.5" min="0" placeholder="0.0">
        </div>

        <div class="form-group">
            <label for="finalSummary">Краткий итог работ</label>
            <input type="text" id="finalSummary" th:field="*{finalSummary}" class="form-control"
                   placeholder="Что было сделано...">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-success">→ Создать заказ</button>
            <a class="btn btn-secondary" th:href="@{/orders}">Отмена</a>
        </div>
    </form>
</div>
</section>

</body>
</html>
