<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(#{clients.firstName} + ' — RepairDesk', ~{::section})}">
<head></head>
<body>
<section>
<div class="topbar">
    <div class="page-title">◉ <span th:text="#{btn.edit}">Edit</span> <span th:text="#{page.clients}">Client</span></div>
    <a class="btn btn-secondary btn-sm" th:href="@{/clients}" th:text="'← ' + #{btn.back}">← Back</a>
</div>
<div class="page-content">
    <form class="rd-form" th:action="@{/clients/edit/{id}(id=${client.id})}" th:object="${client}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
            <label for="firstName" th:text="#{clients.firstName}">First Name</label>
            <input type="text" id="firstName" th:field="*{firstName}" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="lastName" th:text="#{clients.lastName}">Last Name</label>
            <input type="text" id="lastName" th:field="*{lastName}" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="phone" th:text="#{clients.phone}">Phone</label>
            <input type="text" id="phone" th:field="*{phone}" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="email" th:text="#{clients.email}">Email</label>
            <input type="email" id="email" th:field="*{email}" class="form-control">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-success">→ <span th:text="#{btn.save}">Save</span></button>
            <a class="btn btn-secondary" th:href="@{/clients}" th:text="#{btn.cancel}">Cancel</a>
        </div>
    </form>
</div>
</section>
</body>
</html>
