<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактировать клиента — RepairDesk</title>
</head>
<body th:replace="~{layout :: layout('Редактировать клиента — RepairDesk', ~{::section})}">

<section>
<div class="topbar">
    <div class="page-title">◉ Редактировать клиента</div>
    <a class="btn btn-secondary btn-sm" th:href="@{/clients}">← Назад</a>
</div>

<div class="page-content">
    <form class="rd-form" th:action="@{/clients/edit/{id}(id=${client.id})}" th:object="${client}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
            <label for="firstName">Имя</label>
            <input type="text" id="firstName" th:field="*{firstName}" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="lastName">Фамилия</label>
            <input type="text" id="lastName" th:field="*{lastName}" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="phone">Телефон</label>
            <input type="text" id="phone" th:field="*{phone}" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="email">Email <span style="color:var(--muted);font-size:11px;">(необязательно)</span></label>
            <input type="email" id="email" th:field="*{email}" class="form-control">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-success">→ Сохранить</button>
            <a class="btn btn-secondary" th:href="@{/clients}">Отмена</a>
        </div>
    </form>
</div>
</section>

</body>
</html>
