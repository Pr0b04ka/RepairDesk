<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Клиенты — RepairDesk</title>
</head>
<body th:replace="~{layout :: layout('Клиенты — RepairDesk', ~{::section})}">

<section>
<div class="topbar">
    <div class="page-title">◉ Клиенты</div>
</div>

<div class="page-content">
    <div th:with="activePage='clients'"></div>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="toolbar">
        <a class="btn btn-primary" th:href="@{/clients/create}">+ Новый клиент</a>
    </div>

    <table class="rd-table">
        <thead>
        <tr>
            <th>#</th>
            <th>Имя</th>
            <th>Фамилия</th>
            <th>Телефон</th>
            <th>Email</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(clients)}">
            <td colspan="6" style="color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:12px; text-align:center; padding:32px;">
                Нет клиентов. <a th:href="@{/clients/create}" style="color:var(--accent);">Добавить первого →</a>
            </td>
        </tr>
        <tr th:each="client : ${clients}">
            <td style="font-family:'IBM Plex Mono',monospace; color:var(--muted);" th:text="${client.id}"></td>
            <td th:text="${client.firstName}"></td>
            <td th:text="${client.lastName}"></td>
            <td style="font-family:'IBM Plex Mono',monospace;" th:text="${client.phone}"></td>
            <td style="color:var(--muted);" th:text="${client.email}"></td>
            <td>
                <a class="btn btn-sm btn-warning" th:href="@{/clients/edit/{id}(id=${client.id})}">Изменить</a>
                <a class="btn btn-sm btn-danger"
                   th:href="@{/clients/delete/{id}(id=${client.id})}"
                   onclick="return confirm('Удалить клиента?');">Удалить</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</section>

</body>
</html>
