<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список клиентов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Список клиентов</h2>
    <div class="mb-3">
        <a class="btn btn-primary" th:href="@{/clients/create}">Создать клиента</a>
        <a class="btn btn-secondary" th:href="@{/orders}">Заказы</a>
        <a class="btn btn-secondary" th:href="@{/devices}">Устройства</a>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger">
        <span th:text="${errorMessage}"></span>
    </div>

    <div th:if="${successMessage}" class="alert alert-success">
        <span th:text="${successMessage}"></span>
    </div>

    <script>
        setTimeout(function() {
            let alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => alert.style.display = 'none');
        }, 2000);
    </script>

    <table class="table table-striped table-bordered">
        <thead>
        <tr>
            <th>ID</th>
            <th>Имя</th>
            <th>Фамилия</th>
            <th>Телефон</th>
            <th>Email</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="client : ${clients}">
            <td th:text="${client.id}"></td>
            <td th:text="${client.firstName}"></td>
            <td th:text="${client.lastName}"></td>
            <td th:text="${client.phone}"></td>
            <td th:text="${client.email}"></td>
            <td>
                <a class="btn btn-sm btn-warning"
                   th:href="@{/clients/edit/{id}(id=${client.id})}">
                    Редактировать
                </a>

                <a class="btn btn-sm btn-danger"
                   th:href="@{/clients/delete/{id}(id=${client.id})}"
                   onclick="return confirm('Удалить клиента?');">
                    Удалить
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
