<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(#{page.clients} + ' — RepairDesk', ~{::section})}">
<head></head>
<body>
<section>
<div class="topbar">
    <div class="page-title">◉ <span th:text="#{page.clients}">Clients</span></div>
</div>
<div class="page-content">
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="toolbar">
        <a class="btn btn-primary" th:href="@{/clients/create}">+ <span th:text="#{clients.new}">New Client</span></a>
    </div>

    <table class="rd-table">
        <thead>
        <tr>
            <th>#</th>
            <th th:text="#{clients.firstName}">First Name</th>
            <th th:text="#{clients.lastName}">Last Name</th>
            <th th:text="#{clients.phone}">Phone</th>
            <th th:text="#{clients.email}">Email</th>
            <th th:text="#{clients.actions}">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(clients)}">
            <td colspan="6" style="color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:12px; text-align:center; padding:32px;">
                <a th:href="@{/clients/create}" style="color:var(--accent);" th:text="#{clients.new}">New Client</a>
            </td>
        </tr>
        <tr th:each="client : ${clients}">
            <td style="font-family:'IBM Plex Mono',monospace; color:var(--muted);" th:text="${client.id}"></td>
            <td th:text="${client.firstName}"></td>
            <td th:text="${client.lastName}"></td>
            <td style="font-family:'IBM Plex Mono',monospace;" th:text="${client.phone}"></td>
            <td style="color:var(--muted);" th:text="${client.email}"></td>
            <td>
                <a class="btn btn-sm btn-warning"
                   th:href="@{/clients/edit/{id}(id=${client.id})}"
                   th:text="#{btn.edit}">Edit</a>
                <a class="btn btn-sm btn-danger"
                   th:href="@{/clients/delete/{id}(id=${client.id})}"
                   th:onclick="'return confirm(\'' + #{confirm.deleteClient} + '\')'"
                   th:text="#{btn.delete}">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</section>
</body>
</html>
