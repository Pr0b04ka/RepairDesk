<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(#{devices.new} + ' — RepairDesk', ~{::section})}">
<head></head>
<body>
<section>
<div class="topbar">
    <div class="page-title">▣ <span th:text="#{devices.new}">New Device</span></div>
    <a class="btn btn-secondary btn-sm" th:href="@{/devices}" th:text="'← ' + #{btn.back}">← Back</a>
</div>
<div class="page-content">
    <form class="rd-form" th:action="@{/devices/create}" th:object="${device}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
            <label for="brand" th:text="#{devices.brand}">Brand</label>
            <input type="text" id="brand" th:field="*{brand}" class="form-control" placeholder="Apple, Samsung, Asus..." required>
        </div>
        <div class="form-group">
            <label for="model" th:text="#{devices.model}">Model</label>
            <input type="text" id="model" th:field="*{model}" class="form-control" placeholder="iPhone 14, Galaxy S23..." required>
        </div>
        <div class="form-group">
            <label for="type" th:text="#{devices.type}">Type</label>
            <input type="text" id="type" th:field="*{type}" class="form-control" placeholder="Smartphone, Laptop, Tablet..." required>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-success">→ <span th:text="#{btn.save}">Save</span></button>
            <a class="btn btn-secondary" th:href="@{/devices}" th:text="#{btn.cancel}">Cancel</a>
        </div>
    </form>
</div>
</section>
</body>
</html>
